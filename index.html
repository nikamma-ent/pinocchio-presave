<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pinocchio — Shashwat Bulusu</title>
<meta name="description" content="Presave Pinocchio by Shashwat Bulusu.">
<link rel="stylesheet" href="styles.css">
</head>
<body>

  <main class="page">
    <header class="header">
      <img class="title-logo" src="assets/logo.png" alt="Pinocchio">
    </header>

    <div class="portrait" id="portrait">
      <img class="portrait__base" src="assets/pinocchio_base.png" alt="Hand-drawn portrait of the Pinocchio artwork">
      <img class="portrait__caption" id="portraitCaption" src="assets/pinocchio_caption.png" alt="Caption reading 'I just lied'">
    </div>

    <section class="counter" aria-live="polite">
      <p class="counter__number" id="counterNumber">—</p>
      <p class="counter__label">pre-saves &amp; counting</p>
    </section>

    <a class="presave-btn" id="presaveBtn" href="https://open.spotify.com/album/4C6Cgfuc0ZjnEMV76tnyUK?si=6dbf057bf866456a" target="_blank" rel="noopener noreferrer">
      Pre-Save To Make My Nose Grow
    </a>

    <a class="preorder-btn" href="https://shashwatbulusu.bandcamp.com/album/pinocchio" target="_blank" rel="noopener noreferrer">
      Pre-Order
    </a>
  </main>

<script src="app.js"></script>
</body>
</html>
